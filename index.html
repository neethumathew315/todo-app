<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To-Do-List</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <header>
                <h1>To-Do-List</h1>
                <button id="themeButton">🌙</button>
            </header>
                
            <section class="task-creation">
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskInput">Task</label>
                        <input type="text"  id="taskInput" placeholder="Enter your task">
                    </div>

                    <div class="form-group">
                        <label for="categorySelect">Category</label>
                        <select id="categorySelect">
                            <option value="">Select Category</option>
                            <option value="work">Work</option>
                            <option value="study">Study</option>
                            <option value="personal">Personal</option>
                            <option value="health">Health</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prioritySelect">Priority</label>
                        <select id="prioritySelect">
                            <option value="">Select Priority</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate">
                    </div>

                    <button id="addTaskBtn">Add Task</button>
                </form>
            </section>

            <section class="stats">
                <!-- Total Tasks -->
                <div class="stat-card">
                    <h3>Total Tasks</h3>
                    <p id="totalTasks">0</p>
                </div>

                <!-- Completed Tasks -->
                <div class="stat-card">
                    <h3>Completed</h3>
                    <p id="completedTasks">0</p>
                </div>

                <!-- Pending Tasks -->
                <div class="stat-card">
                    <h3>Pending</h3>
                    <p id="pendingTasks">0</p>
                </div>
            </section>

            <section class="task-controls">
                <input type="text" id="searchInput" placeholder="Search tasks">

                <select id="filterSelect">
                    <option>All Tasks</option>
                    <option>Completed</option>
                    <option>Pending</option>
                </select>
            </section>

            <!-- Task List Section -->
            <section class="task-list">

                <h2>Tasks</h2>

                <!-- Empty State -->
                <div class="empty-state">
                    <h3>No tasks yet.</h3>
                    <p>Start by adding your first task.</p>
                </div>

                <div id="taskContainer">

                    <!-- Task Card -->
                    <div class="task-card">
                        
                        <!-- Left Side -->
                        <div class="task-info">

                            <!-- Checkbox -->
                            <input type="checkbox" class="task-check">

                            <!-- Task Details -->
                            <div class="task-details">

                                <!-- Task Title -->
                                <h3 class="task-title">Complete JavaScript Todo App</h3>

                                <div class="task-meta">
                                    <!-- Category -->
                                    <p class="task-category">Category: Study</p>

                                    <!-- Priority -->
                                    <p class="task-priority">Priority: High</p>

                                    <!-- Due Date -->
                                    <p class="task-date">Due Date: 30 May 2026</p>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="task-actions">

                            <!-- Edit Button -->
                            <button class="edit-btn">Edit</button>

                            <!-- Delete Button -->
                            <button class="delete-btn">Delete</button>

                        </div>

                    </div>
                </div>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
