<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <h1>ToDo App</h1>
        <section>
            <h2>List Items</h2>

            <div>
                <input type="text" placeholder="Enter list items" id="input-text" required>
                <button id="add-button">Add List</button>
            </div>
        </section>

        <section>
            <div>
                <ul id="list-items"></ul>
            </div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
